name: Data Integrity Audit

concurrency:
  group: aria-global-lock
  cancel-in-progress: false

on:
  schedule:
    # 毎週日曜 JST 06:00 (UTC 土曜 21:00) : 04:00のIndices終了後に開始し、08:00のHarvester再開前に完了させる
    - cron: '0 21 * * 6'
  workflow_dispatch:
    inputs:
      repair_mode:
        description: 'Run self-healing repair'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 10年分の監査は時間がかかるため長めに設定
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'recursive'
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Integrity Audit
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO }}
          PYTHONPATH: .
        run: |
          REPAIR_FLAG=""
          if [ "${{ github.event.inputs.repair_mode }}" = "true" ]; then
            REPAIR_FLAG="--repair"
          fi
          python -m data_engine.services.data_reconciliation --save-report $REPAIR_FLAG
      
      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: reconciliation-report
          path: logs/reconciliation_report.json
          retention-days: 14
