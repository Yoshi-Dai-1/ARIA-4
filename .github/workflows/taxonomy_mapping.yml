name: Taxonomy Mapping Generator

on:
  schedule:
    # 毎年1回か半年に1回などで十分（ここでは毎月1日 AM4:00 JST / UTC 19:00 の実行例）
    - cron: '0 19 1 * *'
  workflow_dispatch:
    inputs:
      target_year:
        description: '対象年度（空欄の場合は最新年を自動取得）'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-mapping:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: 'recursive'
          
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Generate Taxonomy Mapping
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: .
          TARGET_YEARS: ${{ github.event.inputs.target_year }}
        run: |
          mkdir -p master/meta
          python data_engine/executors/taxonomy_mapper.py

      - name: Commit and Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ vars.HF_REPO }}
          PYTHONPATH: .
        run: |
          # The generated parquet file should be saved to master/meta/taxonomy_mapping.parquet
          # We push this directly to the Hugging Face lakehouse using the catalog manager
          python -c "
          import os
          import sys
          from pathlib import Path
          from loguru import logger
          from data_engine.catalog_manager import CatalogManager
          
          # 工学的主権: 常に絶対的なパスから存在確認を行う
          file_path = Path('master/meta/taxonomy_mapping.parquet')
          if not file_path.exists():
              logger.critical(f'File not found: {file_path.absolute()}')
              sys.exit(1)
              
          logger.info('Initializing CatalogManager (EDINET disabled) and connecting to Hugging Face...')
          # 工学的主権: このジョブはEDINET APIを使用しないため明示的に無効化し、余計なWARNINGログを抑止する
          cm = CatalogManager(edinet=False)
          
          logger.info(f'Uploading {file_path.name} to HF Lakehouse...')
          # 工学的主権: HfStorage の _upload_with_retry 機構によるネットワーク・フェイルセーフなアップロード
          success = cm.hf.upload_raw(
              local_path=file_path,
              repo_path='meta/taxonomy_mapping.parquet'
          )
          
          if success:
              logger.success('Taxonomy mapping uploaded successfully.')
          else:
              logger.critical('Upload failed due to network resilience limits (Max Retries Expired).')
              sys.exit(1)
          "
